apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-hello
  labels:
    app: flask-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-hello
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: flask-hello
    spec:
      containers:
      - name: flask-hello
        image: localhost:4000/flask_hello:latest
        ports:
        - containerPort: 5000
        # Force le re-pull à chaque déploiement
        imagePullPolicy: Always